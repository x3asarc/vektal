# Shopify Multi-Supplier Platform - Docker Compose
# Production-ready lean configuration for 4GB VPS

x-common-logging: &common-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
    mode: non-blocking

services:
  # ===========================================
  # Nginx Reverse Proxy
  # ===========================================
  nginx:
    image: nginx:1.25
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-network
    logging: *common-logging

  # ===========================================
  # Flask Backend API
  # ===========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "${FLASK_PORT:-5000}:5000"
    volumes:
      - ./src:/app/src
      - ./utils:/app/utils
      - ./config:/app/config
      - ./migrations:/app/migrations
      - ./web:/app/web
      - backend_uploads:/app/uploads
      - backend_data:/app/data
    environment:
      - FLASK_ENV=${FLASK_ENV:-development}
      - APP_ENVIRONMENT=${APP_ENVIRONMENT:-development}
      - APP_DEPLOY_STAGE=${APP_DEPLOY_STAGE:-local}
      - FLASK_DEBUG=${FLASK_DEBUG:-1}
      - FLASK_APP=src/app.py
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - DATABASE_URL=postgresql://${DB_USER:-admin}:${DB_PASSWORD}@db:5432/${DB_NAME:-shopify_platform}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-QJhl0AKnrMX7UpYIreTUkFmNceOCrajUUkUce0XeSr8=}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_TEXT_MODEL=${OPENROUTER_TEXT_MODEL:-google/gemini-3.1-flash-lite-preview}
      - OPENROUTER_TEXT_FALLBACK_MODEL=${OPENROUTER_TEXT_FALLBACK_MODEL:-openrouter/auto}
      - ENABLE_GEMINI_FALLBACK=${ENABLE_GEMINI_FALLBACK:-0}
      - VISION_AI_PROVIDER=${VISION_AI_PROVIDER:-openrouter}
      - VISION_AI_MODEL=${VISION_AI_MODEL:-google/gemini-flash-1.5-8b}
      - SHOPIFY_API_KEY=${SHOPIFY_API_KEY}
      - SHOPIFY_API_SECRET=${SHOPIFY_API_SECRET}
      - API_VERSION=${API_VERSION:-2024-01}
      - APP_URL=${APP_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - GRAPH_ORACLE_ENABLED=${GRAPH_ORACLE_ENABLED:-false}
      - SENTRY_DSN=${SENTRY_DSN}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-development}
      - SENTRY_RELEASE=${SENTRY_RELEASE}
      - SENTRY_PROFILES_SAMPLE_RATE=${SENTRY_PROFILES_SAMPLE_RATE:-1.0}
      - SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}
      - SENTRY_ORG_SLUG=${SENTRY_ORG_SLUG}
      - SENTRY_PROJECT_SLUG=${SENTRY_PROJECT_SLUG}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      sh -c "python -m flask db upgrade &&
             gunicorn --bind 0.0.0.0:5000 --workers 2 --timeout 120 --access-logfile - --error-logfile - src.app:app"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    logging: *common-logging

  # ===========================================
  # Celery Worker (Background Jobs)
  # ===========================================
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - ./src:/app/src
      - ./utils:/app/utils
      - ./config:/app/config
      - ./migrations:/app/migrations
      - backend_uploads:/app/uploads
      - backend_data:/app/data
    environment:
      - APP_ENVIRONMENT=${APP_ENVIRONMENT:-development}
      - APP_DEPLOY_STAGE=${APP_DEPLOY_STAGE:-local}
      - DATABASE_URL=postgresql://${DB_USER:-admin}:${DB_PASSWORD}@db:5432/${DB_NAME:-shopify_platform}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-QJhl0AKnrMX7UpYIreTUkFmNceOCrajUUkUce0XeSr8=}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - VISION_AI_PROVIDER=${VISION_AI_PROVIDER:-openrouter}
      - VISION_AI_MODEL=${VISION_AI_MODEL:-google/gemini-flash-1.5-8b}
      - SHOPIFY_API_KEY=${SHOPIFY_API_KEY}
      - SHOPIFY_API_SECRET=${SHOPIFY_API_SECRET}
      - API_VERSION=${API_VERSION:-2024-01}
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - GRAPH_ORACLE_ENABLED=${GRAPH_ORACLE_ENABLED:-false}
      - SENTRY_DSN=${SENTRY_WORKERS_DSN}
    command: celery -A src.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    logging: *common-logging

  # ===========================================
  # Celery Scraper (Batch)
  # ===========================================
  celery_scraper:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - ./src:/app/src
      - ./utils:/app/utils
      - ./config:/app/config
      - ./migrations:/app/migrations
      - backend_uploads:/app/uploads
      - backend_data:/app/data
    environment:
      - APP_ENVIRONMENT=${APP_ENVIRONMENT:-development}
      - APP_DEPLOY_STAGE=${APP_DEPLOY_STAGE:-local}
      - DATABASE_URL=postgresql://${DB_USER:-admin}:${DB_PASSWORD}@db:5432/${DB_NAME:-shopify_platform}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-QJhl0AKnrMX7UpYIreTUkFmNceOCrajUUkUce0XeSr8=}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - VISION_AI_PROVIDER=${VISION_AI_PROVIDER:-openrouter}
      - VISION_AI_MODEL=${VISION_AI_MODEL:-google/gemini-flash-1.5-8b}
      - SHOPIFY_API_KEY=${SHOPIFY_API_KEY}
      - SHOPIFY_API_SECRET=${SHOPIFY_API_SECRET}
      - API_VERSION=${API_VERSION:-2024-01}
      - SENTRY_DSN=${SENTRY_WORKERS_DSN}
    command: celery -A src.celery_app worker --loglevel=info --concurrency=3 -Q batch.t1,batch.t2,batch.t3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    logging: *common-logging

  # ===========================================
  # Celery Assistant (Runtime)
  # ===========================================
  celery_assistant:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - ./src:/app/src
      - ./utils:/app/utils
      - ./config:/app/config
      - ./migrations:/app/migrations
      - backend_uploads:/app/uploads
      - backend_data:/app/data
    environment:
      - APP_ENVIRONMENT=${APP_ENVIRONMENT:-development}
      - APP_DEPLOY_STAGE=${APP_DEPLOY_STAGE:-local}
      - DATABASE_URL=postgresql://${DB_USER:-admin}:${DB_PASSWORD}@db:5432/${DB_NAME:-shopify_platform}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-QJhl0AKnrMX7UpYIreTUkFmNceOCrajUUkUce0XeSr8=}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SHOPIFY_API_KEY=${SHOPIFY_API_KEY}
      - SHOPIFY_API_SECRET=${SHOPIFY_API_SECRET}
      - API_VERSION=${API_VERSION:-2024-01}
      - SENTRY_DSN=${SENTRY_WORKERS_DSN}
    command: celery -A src.celery_app worker --loglevel=info --concurrency=2 -Q assistant.t1,assistant.t2,assistant.t3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    logging: *common-logging

  # ===========================================
  # Flower Monitoring
  # ===========================================
  flower:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - FLOWER_BASIC_AUTH=${FLOWER_BASIC_AUTH:-admin:admin}
    command: celery -A src.celery_app flower --port=5555 --persistent=True --db=/tmp/flower.db
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    logging: *common-logging

  # ===========================================
  # Next.js Frontend
  # ===========================================
  frontend:
    image: node:20-slim
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    working_dir: /app
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - NEXT_PRIVATE_API_PROXY_ORIGIN=http://backend:5000
      - NEXT_PUBLIC_API_BASE_URL=${APP_URL}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN}
      - SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}
      - SENTRY_ORG=${SENTRY_ORG}
      - SENTRY_PROJECT=${SENTRY_PROJECT}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-development}
      - SENTRY_RELEASE=${SENTRY_RELEASE}
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    networks:
      - app-network
    logging: *common-logging

  # ===========================================
  # PostgreSQL Database
  # ===========================================
  db:
    image: postgres:16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME:-shopify_platform}
      - POSTGRES_USER=${DB_USER:-admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-admin}", "-d", "${DB_NAME:-shopify_platform}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network

  # ===========================================
  # Redis
  # ===========================================
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --tcp-keepalive 60 --timeout 300
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  # ===========================================
  # Neo4j Graph Database
  # ===========================================
  neo4j:
    image: neo4j:5.26
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_server_memory_heap_max__size=512M
      - NEO4J_server_memory_pagecache_size=256M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres_data:
    name: shopify_postgres_data
  redis_data:
    name: shopify_redis_data
  backend_uploads:
    name: shopify_backend_uploads
  backend_data:
    name: shopify_backend_data
  neo4j_data:
    name: shopify_neo4j_data
  neo4j_logs:
    name: shopify_neo4j_logs

networks:
  app-network:
    driver: bridge
