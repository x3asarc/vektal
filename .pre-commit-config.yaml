# Pre-commit configuration
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  - repo: local
    hooks:
      # Codebase knowledge graph sync (Primary trigger)
      - id: graph-sync
        name: Sync codebase knowledge graph
        entry: python scripts/hooks/pre-commit-graph-sync.py
        language: python
        stages: [commit-msg]  # Runs after commit message is written
        always_run: true
        verbose: true
