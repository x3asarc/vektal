# Category Detection Keywords
# Used to auto-detect product category from title/description
category_keywords:
  paint:
    - "paint"
    - "acrylic"
    - "tempera"
    - "gouache"
    - "farbe"  # German
    - "festék"  # Hungarian

  "rice paper":
    - "rice paper"
    - "reispapier"  # German
    - "rizspapír"  # Hungarian
    - "carta di riso"  # Italian

  napkin:
    - "napkin"
    - "serviette"
    - "szalvéta"  # Hungarian
    - "tovagliolo"  # Italian

  canvas:
    - "canvas"
    - "leinwand"  # German
    - "vászon"  # Hungarian
    - "tela"  # Italian

  brush:
    - "brush"
    - "pinsel"  # German
    - "ecset"  # Hungarian
    - "pennello"  # Italian

  medium:
    - "medium"
    - "gel"
    - "paste"
    - "texture"

  varnish:
    - "varnish"
    - "lacquer"
    - "lakk"  # Hungarian
    - "vernice"  # Italian

# Template Variable Definitions
# Available variables for filename_pattern and alt_text_template:
# {product_name}  - Cleaned product name (no UUIDs, HS codes, etc.)
# {sku}           - Product SKU (lowercase, sanitized)
# {category}      - Auto-detected category (paint, paper, etc.)
# {vendor}        - Vendor name (lowercase)
# {country}       - Country of origin (2-letter code)

# Configuration Notes:
# - All patterns are processed through get_valid_filename() for sanitization
# - Alt text is processed through validate_alt_text() for length/quality
# - Extension is preserved from original image (.jpg, .png, etc.)
# - Vendor names are matched case-insensitively
# - Unknown vendors fall back to 'default' configuration
