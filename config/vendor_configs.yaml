# Vendor Configuration File
# Defines vendor-specific settings for image naming, alt text, and scraping

# Default configuration (used when vendor is unknown or not specified)
default:
  country_of_origin: "SI"
  default_weight: 0.05  # 50g average for unknown products
  filename_pattern: "{product_name}_{sku}"
  alt_text_template: "{product_name}"
  hs_code_default: "9999.00"

  # Vision AI settings (applies to all vendors unless overridden)
  vision_ai:
    enabled: true  # Enable vision AI globally
    fallback_template: "{product_name} von {vendor}"  # Generic fallback (uses runtime vendor)
    max_retries: 3
    timeout_seconds: 10

  keyword_categories:
    default: []

# Pentart (Hungary) - Art supplies, paints, mediums
pentart:
  country_of_origin: "HU"
  default_weight: 0.15  # 150g average for paints/mediums
  filename_pattern: "{category}_{product_name}_{sku}"
  alt_text_template: "{product_name} - {category}"
  hs_code_default: "3210.00"
  hs_code_map:
    paint: "3210.00"
    medium: "3214.10"
    varnish: "3208.10"
    paste: "3214.90"
  keyword_categories:
    paint: ["acrylic paint", "craft paint", "art paint"]
    medium: ["art medium", "painting medium"]
    varnish: ["art varnish", "protective coating"]
    paste: ["texture paste", "modeling paste"]
  scraper:
    enabled: true
    base_url: "https://www.pentacolor.eu"
    search_url: "https://www.pentacolor.eu/kereses?description=0&keyword={sku}"
    fallback_to_database: true

