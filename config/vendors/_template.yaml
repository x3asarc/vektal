# ============================================================================
# VENDOR CONFIGURATION TEMPLATE v1.0
# ============================================================================
#
# This template defines the COMPLETE structure for vendor configurations.
# Used for: scraping, product enrichment, SEO optimization, and content generation.
#
# Location: config/vendors/{vendor_slug}.yaml
# Example:  config/vendors/itd_collection.yaml
#
# Auto-generated by system during vendor discovery, reviewed by user.
#
# ============================================================================

# ============================================================================
# SECTION 1: METADATA
# ============================================================================
# System-managed fields for tracking, versioning, and performance monitoring.
# ============================================================================

_meta:
  schema_version: "1.0"                   # Template version for migrations
  version: 1                              # Config version (increments on update)
  created: "2026-02-08T00:00:00Z"         # ISO timestamp of creation
  last_modified: "2026-02-08T00:00:00Z"   # ISO timestamp of last edit
  last_verified: "2026-02-08T00:00:00Z"   # Last successful scrape
  discovery_method: "auto_inferred"       # auto_inferred | manual | hybrid

  # Confidence tracking
  confidence:
    overall: 0.85                         # Combined confidence score (0.0-1.0)
    scraping: 0.90                        # Selector accuracy
    enrichment: 0.80                      # Enrichment rule accuracy

  # ========================================================================
  # LLM VERIFICATION RESULTS
  # ========================================================================
  # Auto-populated after verification step. Shows what was validated.
  # ========================================================================
  verification:
    status: "verified"                    # pending | verified | failed | needs_review
    verified_at: "2026-02-08T00:00:00Z"   # When verification ran
    verified_by: "gemini-flash"           # Model used for verification
    overall_score: 0.92                   # 0.0-1.0 verification confidence

    # Individual check results
    checks:
      urls:
        status: "passed"                  # passed | failed | warning
        tested: 5                         # Number of URLs tested
        passed: 5                         # Number that worked
        failed: 0
        details: "All product URLs responded with 200 OK"

      selectors:
        status: "passed"
        tested: 8                         # Number of selectors tested
        passed: 7
        failed: 0
        warnings: 1
        details: "Price selector needed fallback on 1 test product"
        issues:
          - field: "price"
            issue: "Primary selector failed, fallback worked"
            severity: "warning"

      sku_patterns:
        status: "passed"
        tested: 10                        # Sample SKUs tested
        matched: 10
        details: "All test SKUs matched pattern ^R\\d{4}[A-Z]?$"

      content_extraction:
        status: "passed"
        details: "Title, description, images extracted successfully"
        sample_results:
          - sku: "R0530"
            title_found: true
            description_found: true
            images_found: 3
            price_found: true

      rate_limiting:
        status: "passed"
        details: "No rate limits encountered during verification"

      site_accessibility:
        status: "passed"
        requires_javascript: true
        requires_cookies: false
        cloudflare_detected: false

    # Recommendations from verification
    recommendations:
      - "Consider adding fallback selector for price field"
      - "Site loads slowly - increased wait times recommended"

    # ========================================================================
    # USER CONFIRMATION PROMPTS
    # ========================================================================
    # When verification finds issues, these prompts are shown to user.
    # User responses are stored here for audit trail.
    # ========================================================================
    user_prompts:
      # Prompts that were shown (null if no issues)
      shown: []
      # Example prompts:
      # - prompt_id: "url_pattern_confirm"
      #   question: "We detected URL pattern /products/{sku}. Is this correct?"
      #   options: ["Yes, correct", "No, let me specify"]
      #   user_response: "Yes, correct"
      #   responded_at: "2026-02-08T12:00:00Z"
      #
      # - prompt_id: "sku_format_unclear"
      #   question: "We found SKUs like R0530 and RP1234. Are these both valid formats?"
      #   options: ["Yes, both valid", "Only R#### is valid", "Let me explain"]
      #   user_response: "Yes, both valid"
      #   responded_at: "2026-02-08T12:01:00Z"
      #
      # - prompt_id: "selector_failed"
      #   question: "Couldn't find price on test product. Where is the price displayed?"
      #   options: ["Try different selector", "Price not shown on site", "Skip price extraction"]
      #   user_response: "Try different selector"
      #   user_input: ".product-info .amount"  # Custom input if provided
      #   responded_at: "2026-02-08T12:02:00Z"

    # Unresolved issues (need user input before proceeding)
    pending_issues: []
    # Example:
    # - issue_id: "missing_collection_urls"
    #   severity: "warning"
    #   question: "We couldn't find collection pages. Can you provide them?"
    #   required: false  # Can proceed without
    #   user_resolved: false

    # Manual verification notes (user can add)
    user_notes: null

  # Performance statistics
  stats:
    total_products_scraped: 0
    successful_scrapes: 0
    failed_scrapes: 0
    success_rate: 0.0
    avg_scrape_time_ms: 0
    total_products_enriched: 0
    last_error: null
    last_error_time: null

  # Version history
  changelog:
    - version: 1
      date: "2026-02-08"
      author: "system"                    # system | user:{email}
      changes: "Initial auto-generated configuration"


# ============================================================================
# SECTION 2: VENDOR IDENTITY
# ============================================================================
# Core vendor information for identification and matching.
# ============================================================================

vendor:
  # Display information
  name: "Vendor Name"                     # Full display name
  name_short: "Vendor"                    # Abbreviated name (for filenames)
  slug: "vendor_name"                     # Lowercase with underscores

  # Domain information
  domain: "example.com"                   # Primary domain (no protocol)
  domains_alt:                            # Alternative/regional domains
    - "www.example.com"
    - "shop.example.com"
  country: "PL"                           # ISO country code (headquarters)
  language: "en"                          # Primary site language

  # Business information
  business_type: "b2c"                    # b2c | b2b | hybrid
  requires_login: false                   # Requires authentication to browse
  wholesale_available: false              # Has wholesale/B2B portal

  # Contact (optional)
  contact:
    website: "https://example.com"
    email: null
    phone: null

  # Brand assets (for rich content)
  branding:
    logo_url: null                        # Vendor logo URL
    brand_color: null                     # Primary brand color (hex)


# ============================================================================
# SECTION 3: NICHE & CATEGORIZATION
# ============================================================================
# Vendor's market positioning - used for niche matching and product discovery.
# ============================================================================

niche:
  # Primary category (for niche safety checks)
  primary: "arts_and_crafts"
  # Options: arts_and_crafts, automotive, electronics, fashion, food_beverage,
  #          health_beauty, home_garden, sports_outdoors, toys_games, other

  # Sub-categories (more specific)
  sub_categories:
    - "decoupage"
    - "scrapbooking"
    - "mixed_media"
    - "painting"

  # Product types this vendor sells
  product_types:
    - "rice_paper"
    - "napkins"
    - "acrylic_paint"
    - "stencils"
    - "adhesives"

  # Related techniques/crafts
  techniques:
    - "decoupage"
    - "serviettentechnik"
    - "mixed_media"
    - "resin_art"
    - "furniture_upcycling"


# ============================================================================
# SECTION 4: SKU PATTERNS
# ============================================================================
# How to identify products from this vendor by their SKU format.
# ============================================================================

sku_patterns:
  # Primary pattern (most common)
  - name: "standard"
    regex: "^[A-Z]{1,2}\\d{4}[A-Z]?$"
    description: "Standard product SKUs"
    examples:
      - "R0530"
      - "R0530L"
      - "RP1234"
    confidence_boost: 0.30                # Add to confidence when matched
    extract_info:                         # What can be extracted from SKU
      size_suffix: true                   # Last letter indicates size
      product_line_prefix: true           # First letters indicate line

  # Additional patterns for different product lines
  # - name: "premium_line"
  #   regex: "^PREM-\\d{6}$"
  #   description: "Premium product line"
  #   examples: ["PREM-123456"]
  #   confidence_boost: 0.25


# ============================================================================
# SECTION 5: SIZE & VARIANT ENCODING
# ============================================================================
# How size/color/variant information is encoded in SKUs and products.
# ============================================================================

variants:
  # Size encoding in SKUs
  size_encoding:
    enabled: true
    method: "suffix"                      # suffix | prefix | separate_field
    default: "A4"                         # When no indicator present

    # SKU suffix to size mapping
    mappings:
      "": "A4"                            # No suffix = A4
      "L": "A3"                           # L = A3 (Large)
      "XL": "A2"                          # XL = A2
      "S": "A5"                           # S = A5 (Small)
      "M": "A4"                           # M = A4 (Medium)

  # Size display names (for titles/descriptions)
  size_display:
    "A5": "A5 (148 × 210 mm)"
    "A4": "A4 (210 × 297 mm)"
    "A3": "A3 (297 × 420 mm)"
    "A2": "A2 (420 × 594 mm)"

  # Variant strategy for Shopify
  variant_strategy: "separate_products"   # separate_products | shopify_variants
  # separate_products: Each size is a separate Shopify product
  # shopify_variants: Sizes are variants of one product


# ============================================================================
# SECTION 6: URL TEMPLATES
# ============================================================================
# How to construct URLs for product pages and collections.
# Placeholders: {domain}, {sku}, {sku_lower}, {sku_upper}, {sku_base}
# ============================================================================

urls:
  # Product page URL
  product:
    template: "https://{domain}/products/{sku_lower}"
    fallback_templates:
      - "https://{domain}/product/{sku_lower}"
      - "https://{domain}/p/{sku}"

  # Search URL (when direct URL fails)
  search:
    template: "https://{domain}/search?q={sku}"
    results_selector: ".search-results .product-card"

  # Collection pages (for bulk discovery)
  collections:
    - name: "All Products"
      url: "https://{domain}/collections/all"

    - name: "Rice Paper A4"
      url: "https://{domain}/collections/rice-paper-a4"
      filter_size: "A4"

    - name: "Rice Paper A3"
      url: "https://{domain}/collections/rice-paper-a3"
      filter_size: "A3"

  # URL normalization rules
  normalization:
    lowercase_sku: true
    strip_size_suffix: false              # Remove L/S suffix from URL
    replace_chars:
      " ": "-"
      "_": "-"


# ============================================================================
# SECTION 7: SCRAPING STRATEGY
# ============================================================================
# Technical configuration for how to scrape this vendor's site.
# ============================================================================

scraping:
  # Primary strategy
  strategy:
    primary: "playwright"                 # playwright | selenium | requests
    fallback:
      - "selenium"
      - "requests"
    discovery: "firecrawl"                # For collection crawling

  # Reason for strategy choice (for debugging)
  strategy_reason: "JavaScript-heavy site with dynamic content"

  # Browser configuration
  browser:
    headless: true
    viewport:
      width: 1920
      height: 1080
    user_agent: null                      # null = default
    locale: "de-AT"                       # Browser locale
    timezone: "Europe/Vienna"             # Browser timezone

  # Timing
  timing:
    page_load_wait_ms: 3000               # Wait after navigation
    dynamic_content_wait_ms: 1500         # Wait for JS rendering
    selector_timeout_ms: 5000             # Max wait for selectors

  # Rate limiting
  rate_limits:
    delay_between_requests_ms: 3000
    delay_jitter_ms: 1000                 # Random 0-1000ms added
    max_concurrent_requests: 2
    batch_size: 50
    batch_delay_ms: 10000

  # Retry configuration
  retry:
    max_attempts: 4
    backoff_multiplier: 2.0
    initial_delay_ms: 1000
    max_delay_ms: 30000

  # Rate limit detection
  rate_limit_detection:
    status_codes: [429, 503]
    body_patterns:
      - "rate limit"
      - "too many requests"
      - "please try again"
    cooldown_ms: 60000


# ============================================================================
# SECTION 8: CSS SELECTORS
# ============================================================================
# Where to find product data on the page.
# ============================================================================

selectors:
  # Product images (CRITICAL)
  images:
    container: ".product-gallery"
    items: "img.product-image"
    src_attribute: "src"
    srcset_attribute: "srcset"
    data_attributes:                      # Alternative src locations
      - "data-src"
      - "data-lazy-src"
      - "data-zoom-image"
    fallback_selectors:
      - ".product-media img"
      - "[data-product-image]"
      - ".product__image img"

  # Product title
  title:
    selector: "h1.product-title"
    fallback_selectors:
      - ".product__title"
      - "h1"
      - "[data-product-title]"

  # Product price
  price:
    selector: ".price__current"
    fallback_selectors:
      - ".product-price"
      - "[data-price]"
      - ".price"
    parsing:
      currency: "EUR"
      currency_symbol: "€"
      decimal_separator: ","              # European: 3,49
      thousands_separator: "."            # European: 1.234,56

  # Product description
  description:
    selector: ".product-description"
    fallback_selectors:
      - ".product__description"
      - "[data-description]"
      - ".description"
    extract_as: "html"                    # text | html | markdown

  # SKU on page (for validation)
  sku:
    selector: ".product-sku"
    fallback_selectors:
      - "[data-sku]"
      - ".sku-value"
      - "[data-variant-sku]"

  # Stock/availability
  availability:
    selector: ".stock-status"
    in_stock_patterns:
      - "In Stock"
      - "Auf Lager"
      - "Verfügbar"
      - "Available"
    out_of_stock_patterns:
      - "Out of Stock"
      - "Ausverkauft"
      - "Nicht verfügbar"
      - "Sold Out"

  # Additional data points
  additional:
    brand:
      selector: ".product-brand"
    weight:
      selector: ".product-weight"
    dimensions:
      selector: ".product-dimensions"
    material:
      selector: ".product-material"


# ============================================================================
# SECTION 9: VALIDATION RULES
# ============================================================================
# How to validate scraped data quality.
# ============================================================================

validation:
  # SKU validation
  sku:
    must_match_input: true                # Scraped SKU must match requested
    normalize_before_compare: true        # Lowercase, strip spaces
    allowed_variations:
      - "case_insensitive"                # R0530 = r0530
      - "ignore_hyphens"                  # R-0530 = R0530
      - "ignore_spaces"                   # R 0530 = R0530

  # Image validation
  images:
    min_count: 1
    max_count: 10
    min_width_px: 400
    min_height_px: 400
    max_file_size_mb: 10
    allowed_formats:
      - "jpg"
      - "jpeg"
      - "png"
      - "webp"
    reject_placeholders: true             # Reject "no-image.jpg" etc.
    placeholder_patterns:
      - "no-image"
      - "placeholder"
      - "coming-soon"

  # Content validation
  content:
    min_title_length: 5
    max_title_length: 200
    min_description_length: 20
    required_fields:
      - "title"
      - "images"


# ============================================================================
# SECTION 10: VENDOR-SPECIFIC QUIRKS
# ============================================================================
# Special behaviors and workarounds for this vendor.
# ============================================================================

quirks:
  # Site protection
  cloudflare_protected: false
  captcha_protected: false
  requires_cookies_accept: false

  # Content loading
  lazy_loads_images: true
  infinite_scroll: false
  requires_javascript: true

  # Pre-scrape actions (run before scraping)
  pre_scrape_actions:
    # - action: "click"
    #   selector: "#accept-cookies"
    #   wait_after_ms: 1000
    # - action: "scroll"
    #   direction: "down"
    #   amount_px: 500
    # - action: "wait"
    #   duration_ms: 2000

  # Known issues
  known_issues:
    - issue: "Images lazy-load on scroll"
      workaround: "Scroll page before extracting images"


# ============================================================================
# SECTION 11: GSD OPTIMIZATION (Direct URL Mappings)
# ============================================================================
# Pre-mapped SKU → URL relationships discovered via Firecrawl.
# Dramatically speeds up scraping by bypassing search.
# ============================================================================

gsd_mappings:
  enabled: true
  auto_populate: true                     # Add mappings after successful scrapes

  # Discovery tracking
  last_discovery_run: null                # ISO timestamp
  discovery_source: null                  # firecrawl | sitemap | manual
  total_mapped_skus: 0

  # Direct mappings (populated automatically or manually)
  # Format: SKU: URL
  mappings: {}
  # Example:
  # R0530: "https://itdcollection.com/products/r0530"
  # R0531: "https://itdcollection.com/products/r0531"


# ============================================================================
# ============================================================================
#
#                    PRODUCT ENRICHMENT CONFIGURATION
#
# ============================================================================
# ============================================================================
# Everything below this line is used for ENRICHING products after scraping.
# When a product is identified as belonging to this vendor, these rules
# are applied to enhance SEO, content quality, and discoverability.
# ============================================================================


# ============================================================================
# SECTION 12: VENDOR KEYWORDS & TAGS
# ============================================================================
# Keywords associated with this vendor - automatically applied to products.
# ============================================================================

enrichment:
  keywords:
    # Primary keywords (high relevance, always applied)
    primary:
      - "decoupage"
      - "rice paper"
      - "reispapier"
      - "serviettentechnik"

    # Secondary keywords (applied based on product type)
    secondary:
      - "craft supplies"
      - "bastelbedarf"
      - "DIY"
      - "handmade"
      - "creative"

    # Vendor-specific keywords (brand association)
    brand:
      - "ITD Collection"
      - "premium quality"
      - "made in Poland"
      - "Italian rice paper"

    # Technique keywords (what can be done with products)
    techniques:
      - "furniture upcycling"
      - "möbel aufarbeiten"
      - "card making"
      - "scrapbooking"
      - "mixed media art"

    # Material keywords
    materials:
      - "rice paper"
      - "mulberry paper"
      - "acid-free"
      - "archival quality"

  # Automatic tag generation rules
  tagging:
    # Always add these tags to products from this vendor
    always_add:
      - "vendor:ITD Collection"
      - "origin:Poland"
      - "quality:premium"

    # Add based on product type detection
    conditional:
      - condition: "title contains 'A4'"
        add_tags:
          - "size:A4"
          - "format:210x297mm"

      - condition: "title contains 'A3'"
        add_tags:
          - "size:A3"
          - "format:297x420mm"

      - condition: "title contains 'vintage'"
        add_tags:
          - "style:vintage"
          - "aesthetic:retro"

      - condition: "title contains 'floral' OR title contains 'rose' OR title contains 'flower'"
        add_tags:
          - "motif:floral"
          - "theme:nature"


# ============================================================================
# SECTION 13: CATEGORY MAPPING
# ============================================================================
# How to categorize products from this vendor in your store.
# ============================================================================

  categories:
    # Default category for this vendor's products
    default: "Decoupage Supplies"

    # Shopify product_type mapping
    product_type_rules:
      - match: "rice paper"
        product_type: "Reispapier"

      - match: "napkin"
        product_type: "Servietten"

      - match: "stencil"
        product_type: "Schablonen"

      - match: "paint"
        product_type: "Farben"

    # Collection assignments
    collections:
      always:
        - "All Products"
        - "Decoupage"
        - "ITD Collection"

      conditional:
        - condition: "size == 'A4'"
          collections:
            - "Rice Paper A4"
            - "Reispapier A4"

        - condition: "size == 'A3'"
          collections:
            - "Rice Paper A3"
            - "Reispapier A3"


# ============================================================================
# SECTION 14: CONTENT TEMPLATES
# ============================================================================
# How to format product titles, descriptions, and metadata.
# Ensures consistency across all products from this vendor.
# ============================================================================

  content_templates:
    # Product title template
    # Placeholders: {product_name}, {size}, {vendor}, {sku}, {style}, {motif}
    title:
      template: "{product_name} - {size} - {vendor}"
      max_length: 70
      capitalize: "title_case"            # title_case | sentence_case | uppercase

      examples:
        - "Reispapier Vintage Rose - A4 - ITD Collection"
        - "Rice Paper Floral Garden - A3 - ITD Collection"

    # Product description structure
    description:
      # Full template with sections
      template: |
        {intro_paragraph}

        {features_list}

        {specifications}

        {usage_ideas}

        {call_to_action}

      # Section templates
      sections:
        intro_paragraph:
          template: "Dieses hochwertige {product_type} von {vendor} eignet sich perfekt für Ihre {technique}-Projekte. {unique_feature}."

        features_list:
          format: "bullets"               # bullets | numbered | paragraph
          bullet_char: "•"
          items:
            - "Premium Qualität aus {origin}"
            - "Ideal für {techniques}"
            - "{material_description}"
            - "Motiv: {motif}"

        specifications:
          template: "Größe: {size_display}"

        usage_ideas:
          template: "Perfekt für {use_cases}."

        call_to_action:
          template: "Bestellen Sie jetzt und lassen Sie Ihrer Kreativität freien Lauf!"

      # Length constraints
      min_length: 150
      max_length: 600
      target_length: 350

      # Language settings
      language: "de"
      formality: "casual"                 # casual | formal
      person: "second"                    # second (Sie/Du) | third (man)


# ============================================================================
# SECTION 15: SEO OPTIMIZATION
# ============================================================================
# Meta titles, descriptions, and structured data for search engines.
# ============================================================================

  seo:
    # Meta title template
    meta_title:
      template: "{product_name} {size} | {store_name}"
      max_length: 60
      store_name: "Bastelschachtel"

      examples:
        - "Reispapier Vintage Rose A4 | Bastelschachtel"

    # Meta description template
    meta_description:
      template: "{product_name} von {vendor} - {key_feature}. {size}. {cta}"
      min_length: 120
      max_length: 160
      target_length: 155

      cta_options:
        - "Jetzt bestellen!"
        - "Schnelle Lieferung!"
        - "Versandkostenfrei ab 50€"

      examples:
        - "Reispapier Vintage Rose von ITD Collection - Premium Qualität für Decoupage. A4 Format. Jetzt bestellen bei Bastelschachtel!"

    # URL handle/slug
    url_handle:
      template: "{product_name}-{size}-{vendor}"
      max_length: 80
      lowercase: true
      separator: "-"
      transliteration:
        "ä": "ae"
        "ö": "oe"
        "ü": "ue"
        "ß": "ss"
      remove_words:                       # Words to strip from URL
        - "der"
        - "die"
        - "das"
        - "und"
        - "für"

      examples:
        - "reispapier-vintage-rose-a4-itd-collection"

    # Focus keywords for SEO
    focus_keywords:
      primary: "{product_type}"           # Main keyword to optimize for
      secondary:
        - "{vendor}"
        - "{technique}"
        - "{size}"
      keyword_density_target: 2.5         # Percentage in description


# ============================================================================
# SECTION 16: IMAGE ENRICHMENT
# ============================================================================
# How to name, tag, and optimize images.
# ============================================================================

  images:
    # File naming convention
    naming:
      pattern: "{vendor_short}_{sku}_{index}.{ext}"
      vendor_short: "itd"                 # Abbreviation for filenames
      lowercase: true
      index_start: 1

      examples:
        - "itd_r0530_1.jpg"
        - "itd_r0530_2.jpg"

    # Alt text template (critical for SEO & accessibility)
    alt_text:
      template: "{product_type} {motif} {size} {vendor}"
      max_length: 125
      include_sku: false                  # SKUs not helpful in alt text

      examples:
        - "Reispapier Vintage Rose A4 ITD Collection"
        - "Rice Paper Floral Pattern A3 ITD Collection"

    # Image optimization settings
    optimization:
      max_width: 2048
      max_height: 2048
      quality: 85                         # JPEG quality (1-100)
      format: "jpg"                       # jpg | png | webp
      strip_metadata: true                # Remove EXIF data


# ============================================================================
# SECTION 17: ATTRIBUTE EXTRACTION
# ============================================================================
# What attributes to extract/infer from product data.
# ============================================================================

  attributes:
    # Attributes to extract from title/description
    extract_from_content:
      colors:
        enabled: true
        patterns:
          - pattern: "\\b(rot|red|rouge)\\b"
            value: "Red"
          - pattern: "\\b(blau|blue|bleu)\\b"
            value: "Blue"
          - pattern: "\\b(grün|green|vert)\\b"
            value: "Green"
          - pattern: "\\b(gold|golden)\\b"
            value: "Gold"
          - pattern: "\\b(silber|silver|argent)\\b"
            value: "Silver"
          - pattern: "\\b(vintage|antik|antique)\\b"
            value: "Vintage"
          - pattern: "\\b(weiß|white|blanc)\\b"
            value: "White"
          - pattern: "\\b(schwarz|black|noir)\\b"
            value: "Black"
          # Add more color patterns...

