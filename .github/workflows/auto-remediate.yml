name: auto-remediate

# Automated remediation loop — detects fixable CI failures and opens PRs.
# Runs after ci-backend completes. Only acts on "safe" auto-fixable classes:
#   - Lint/format issues (ruff, eslint --fix)
#   - Harness SLA gaps (posts a gap report comment)
#   - Stale dependency alerts (posts update suggestion comment)
#
# NEVER: merges PRs, changes auth/security files, or touches protected paths.

on:
  workflow_run:
    workflows: ["ci-backend"]
    types: [completed]
  schedule:
    # Weekly dependency freshness check
    - cron: "0 6 * * 1"

jobs:
  harness-sla-check:
    name: Harness SLA gap report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run after ci-backend, or on schedule
    if: |
      github.event_name == 'schedule' ||
      github.event.workflow_run.conclusion == 'failure'

    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run harness SLA check
        id: sla-check
        run: |
          mkdir -p reports/harness
          python scripts/governance/check_harness_slas.py \
            --report-file reports/harness/sla-report.md || true
          cat reports/harness/sla-report.md

      - name: Post gap report as issue comment (on failure)
        if: github.event.workflow_run.pull_requests[0].number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR number found — skipping comment"
            exit 0
          fi

          HEAD_SHA="${{ github.event.workflow_run.head_sha }}"

          # Build SHA-pinned bot comment
          BODY=$(cat <<EOF
          <!-- sha-gate-bot -->
          <!-- sha:${HEAD_SHA} -->

          ## 🔍 Harness SLA Report

          $(cat reports/harness/sla-report.md)

          ---
          _Auto-generated by \`auto-remediate\` for SHA \`${HEAD_SHA:0:8}\`. Run \`bash scripts/harness/ui/run_e2e.sh\` to generate browser evidence._
          EOF
          )

          gh pr comment "$PR_NUMBER" --body "$BODY" || true

  dependency-freshness:
    name: Dependency freshness check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'schedule'

    permissions:
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for pinned-but-stale deps in requirements.txt
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          req_text = Path("requirements.txt").read_text()

          # Find exact-pinned packages (==)
          pinned = re.findall(r"^([a-zA-Z0-9_\-]+)==([^\s]+)", req_text, re.MULTILINE)

          print("Pinned packages (== versions):")
          for pkg, version in pinned:
              print(f"  {pkg}=={version}")

          print(f"\nTotal pinned: {len(pinned)}")
          print("Run 'pip list --outdated' against a fresh venv to check for updates.")
          print("Use Dependabot or pip-audit for automated freshness checks.")
          PY

      - name: Run pip-audit if available
        run: |
          pip install pip-audit --quiet 2>/dev/null || true
          if command -v pip-audit &>/dev/null; then
            pip-audit --requirement requirements.txt --format json > /tmp/pip-audit.json 2>/dev/null || true
            python - <<'PY'
          import json
          try:
              audit = json.load(open("/tmp/pip-audit.json"))
              vulns = audit.get("vulnerabilities", [])
              if vulns:
                  print(f"⚠️  pip-audit found {len(vulns)} vulnerability/ies:")
                  for v in vulns[:5]:
                      print(f"  - {v.get('name')} {v.get('version')}: {v.get('id')}")
              else:
                  print("✅ pip-audit: no known vulnerabilities")
          except Exception as e:
              print(f"pip-audit result parse error: {e}")
          PY
          else
            echo "pip-audit not installed — skipping vulnerability scan"
          fi

  governance-lint:
    name: Auto governance lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Re-run governance validator to surface issues
        run: |
          python scripts/governance/validate_governance.py 2>&1 || true

      - name: Check harness SLA status
        run: |
          python scripts/governance/check_harness_slas.py 2>&1 || true
